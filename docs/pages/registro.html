<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro | Conquer Blocks</title>

  <meta name="description" content="Regístrate ahora y descubre nuestros cursos">

 <link rel="icon" href="/ConquerX_CSS5/icono.png" type="image/png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">

  <script type="module" crossorigin src="/ConquerX_CSS5/assets/main-Bf0yT03f.js"></script>
  <link rel="stylesheet" crossorigin href="/ConquerX_CSS5/assets/main-DlQ2eWIA.css">
</head>

<body>

  <div data-header></div>
  
  <main>

    <section class="page-hero">
      <div class="container page-hero__inner">
        <h1 class="page-hero__title">Regístrate</h1>
        <p class="page-hero__text">Para poder acceder a todo el contenido de la academia, has de estar registrado</p>
      </div>
    </section>
    
    <section class="section content">
      <div class="container content__inner">
    
        <form class="form" action="post" enctype="multipart/form-data">
          <div class="form__field">
            <label class="form__label" for="name">Nombre completo</label>
            <input class="form__input" type="text" name="name" id="name">
          </div>

          <div class="form__field">
            <label class="form__label" for="birthday">Fecha de nacimiento</label>
            <input class="form__input" type="date" name="birthday" id="birthday">
          </div>

          <div class="form__field">
            <label class="form__label" for="email">Email</label>
            <input class="form__input" type="email" name="email" id="email" required>
          </div>

          <div class="form__field">
            <label class="form__label" for="address">Dirección</label>
            <input class="form__input" type="text" name="address" id="address">
          </div>

          <div class="form__field">
            <label class="form__label" for="web">Página web</label>
            <input class="form__input" type="url" name="web" id="web">
          </div>

          <div class="form__field">
            <label class="form__label" for="photo">Foto</label>
            <input  class="form__input" type="file" name="photo" id="photo">
          </div>

          <div class="form__field">
            <label class="form__label" for="bio">Biografía</label><br>
            <textarea class="form__textarea" name="bio" id="bio" cols="30" rows="5"></textarea>
          </div>

          <div class="form__actions">
            <button class="btn btn--secondary">Enviar</button>
            <input type="reset" value="Borrar" class="btn btn--ghost">
          </div>

        </form>

      </div>
    </section>

  </main>
  
  <div data-footer></div>

</body>

</html>

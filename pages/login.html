<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión | Conquer Blocks</title>

  <meta name="description" content="Inicia sesión y continua descubriendo nuestro contenido">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">

  <script type="module" src="../src/main.js"></script>
</head>

<body>

  <div data-header></div>
  
  <main>
    
    <section class="page-hero">
      <div class="container page-hero__inner">
        <h1 class="page-hero__title">Iniciar sesión</h1>
        <p class="page-hero__text">Para poder acceder a todo el contenido de la academia, has de iniciar sesión</p>
      </div>
    </section>

    <section class="section content">
      <div class="container content__inner">
        <form class="form" action="post" enctype="multipart/form-data">
  
          <div class="form__field">
            <label class="form__label" for="email">Email</label>
            <input class="form__input" type="email" name="email" id="email" required>
          </div>

          <div class="form__field">
            <label class="form__label" for="pass">Contraseña</label>
            <input class="form__input" type="password" name="pass" id="pass" required>
          </div>


          <div class="form__actions">
            <button class="btn btn--secondary">Enviar</button>
            <input type="reset" value="Borrar" class="btn btn--ghost">
          </div>

        </form>

      </div>
    </section>

  </main>

  <div data-footer></div>


</body>

</html>
